<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventaris - G103 Listrik Dasar</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8f9fa; 
        }
        .header-lab { 
            background-color: #1e3a8a; 
            color: white; 
            padding: 40px 0; 
            border-bottom: 5px solid #3b82f6; 
        }
        .btn-kembali {
            color: #dbeafe;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .btn-kembali:hover {
            color: white;
            text-decoration: underline;
        }
        /* Desain untuk label status kondisi */
        .badge-baik { background-color: #198754; color: white; padding: 5px 10px; border-radius: 6px; font-weight: normal;}
        .badge-rusak { background-color: #dc3545; color: white; padding: 5px 10px; border-radius: 6px; font-weight: normal;}
        .badge-perbaikan { background-color: #ffc107; color: black; padding: 5px 10px; border-radius: 6px; font-weight: normal;}
    </style>
</head>
<body>

    <header class="header-lab">
        <div class="container">
            <a href="../index.html" class="btn-kembali"><i class="bi bi-arrow-left me-2"></i> Kembali ke Dashboard</a>
            <h1 class="fw-bold">Laboratorium Layanan Listrik Dasar</h1>
            <p class="mb-0 fs-5 text-light opacity-75">Ruang G103 | Penanggung Jawab: Teknisi Lab TRE</p>
        </div>
    </header>

    <main class="container my-5">
        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-body p-4">
                <h4 class="mb-4">Daftar Peralatan & Komponen</h4>
                
                <div class="table-responsive">
                    <table id="tabelInventaris" class="table table-striped table-hover table-bordered align-middle" style="width:100%">
                        <thead class="table-dark">
                            <tr>
                                <th width="5%">No</th>
                                <th width="15%">No Seri</th>
                                <th width="20%">Nama Alat</th>
                                <th width="25%">Spesifikasi & Merk</th>
                                <th width="10%">Fungsi</th>
                                <th width="10%">Kondisi</th>
                                <th width="15%">Foto</th>
                            </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-4 text-muted mt-5 border-top">
        <p>&copy; 2026 Teknologi Rekayasa Elektro - Inventaris Laboratorium</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

    <script>
        $(document).ready(function() {
            var t = $('#tabelInventaris').DataTable({
                "order": [[5, 'asc']], 
                "ajax": {
                    "url": "../data/g103-data.json", //Note: Sesuaikan dengan nama file json untuk update data inventaris
                    "dataSrc": "" 
                },
                "columns": [
                    { 
                        "data": null,
                        "defaultContent": "",
                        "orderable": false
                    },
                    { "data": "No Seri" }, 
                    { "data": "Nama Alat" }, 
                    { 
                        "data": null,
                        "render": function (data, type, row) {
                            return "<strong>" + row["Merk"] + "</strong><br><small>" + row["Spesifikasi"] + "</small>";
                        }
                    },
                    { "data": "Fungsi" }, 
                    { 
                        "data": "Kondisi",
                        "render": function(data, type, row) {
                            
                            var kondisi = data ? data.trim() : ""; 
                            
                            if (kondisi === "Baik" || kondisi === "Bagus") {
                                return '<span class="badge-baik">Bagus</span>';
                            } else if (kondisi === "Rusak") {
                                return '<span class="badge-rusak">Rusak</span>';
                            } else {
                                return '<span class="badge-perbaikan">' + kondisi + '</span>';
                            }
                        }
                    },
                    { 
                        "data": "Foto Alat",
                        "render": function(data, type, row) {
                            if (data && data.trim() !== "") {
                                return '<a href="' + data + '" target="_blank" class="btn btn-sm btn-outline-primary"><i class="bi bi-image"></i> Cek Foto</a>';
                            }
                            return '<span class="text-muted">-</span>';
                        }
                    }
                ],
                "language": {
                    "search": "Cari Alat:",
                    "lengthMenu": "Tampilkan _MENU_ alat per halaman",
                    "info": "Menampilkan _START_ sampai _END_ dari _TOTAL_ alat",
                    "infoEmpty": "Tidak ada data alat",
                    "infoFiltered": "(disaring dari total _MAX_ alat)",
                    "zeroRecords": "Alat yang dicari tidak ditemukan",
                    "paginate": {
                        "first": "Pertama",
                        "last": "Terakhir",
                        "next": "Selanjutnya",
                        "previous": "Sebelumnya"
                    }
                }
            });

            t.on('order.dt search.dt', function () {
                t.column(0, {search:'applied', order:'applied'}).nodes().each( function (cell, i) {
                    cell.innerHTML = i + 1;
                });
            }).draw();
        });
    </script>
</body>
</html>
